<fontconfig>
    <alias>
        <family>monospace</family>
        <prefer>
            <family>Noto Color Emoji</family>
        </prefer>
    </alias>
    <alias>
        <family>serif</family>
        <prefer>
            <family>Noto Color Emoji</family>
            <family>Source Han Serif JP</family>
        </prefer>
    </alias>
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Noto Color Emoji</family>
            <family>Source Han Sans JP</family>
        </prefer>
    </alias>
    <alias>
        <family>sans</family>
        <prefer>
            <family>Noto Color Emoji</family>
            <family>Source Han Sans JP</family>
        </prefer>
    </alias>
</fontconfig>
