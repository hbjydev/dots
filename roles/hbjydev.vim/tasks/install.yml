---
- name: Ensure .vim/{autoload,bundle} directories exist
  file:
    path: '{{ item }}'
    state: directory
    recurse: false
    mode: 0750
  with_items:
    - '{{ vim_dir }}'
    - '{{ vim_dir }}/autoload'
    - '{{ vim_dir }}/bundle'

- name: Ensure Pathogen is installed
  get_url:
    dest: '{{ vim_dir }}/autoload/pathogen.vim'
    url: 'https://tpo.pe/pathogen.vim'

- name: Deploy plugins
  git:
    dest: '{{ vim_dir }}/bundle/{{ item.name }}'
    repo: '{{ item.url }}'
    clone: true
    update: true
    recursive: false
  with_items: '{{ vim_plugins }}'

- name: Deploy vimrc
  copy:
    src: vimrc.vim
    dest: '{{ vimrc }}'
    backup: true
    mode: 0640
